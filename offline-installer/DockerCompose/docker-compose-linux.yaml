version: "3.9"

services:

  mma:
    image: rodtamin/modbus-memory-appliance:2.3.5
    container_name: mma
    restart: unless-stopped

    # Direct host networking for low-latency Modbus access
    network_mode: host

    # Required for privileged port 502
    user: "0:0"

    cap_add:
      - NET_BIND_SERVICE

    volumes:
      - ./data/mma:/config

    command:
      - /config/config.yaml

  replicator:
    image: rodtamin/modbus-replicator:v0.1.4
    container_name: replicator
    restart: unless-stopped

    depends_on:
      - mma

    # Allows bridge containers to reach host-network services
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./data/replicator:/config

    command:
      - /config/config.yaml

    networks:
      - replicator-net

  web:
    image: rodtamin/mcs-web:v0.76
    container_name: mcs-web
    restart: unless-stopped

    depends_on:
      - mma
      - replicator

    ports:
      - "8081:8080"

    # Allows access to MMA running on host network
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - replicator-net

networks:
  replicator-net:
    driver: bridge