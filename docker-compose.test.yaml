version: "3.9"

services:

  mma:
    image: rodtamin/modbus-memory-appliance:2.3.4
    container_name: mma
    restart: unless-stopped
    ports:
      - "502:502"
    volumes:
      - ./data/mma:/config
    command: ["/config/config.yaml"]
    networks:
      - replicator-net

  modbus-sim:
    image: python:3.12-slim
    container_name: modbus-sim
    restart: unless-stopped
    volumes:
      - ./test:/test
    command: >
      sh -c "pip install pymodbus --quiet && python /test/sim.py"
    networks:
      - replicator-net

  replicator:
    image: rodtamin/modbus-replicator:latest
    container_name: replicator
    restart: unless-stopped
    depends_on:
      - mma
      - modbus-sim
    volumes:
      - ./data/replicator:/config
    command: ["/config/config.yaml"]
    networks:
      - replicator-net

  verify:
    image: python:3.12-slim
    container_name: verify
    restart: "no"
    depends_on:
      - mma
      - modbus-sim
      - replicator
    volumes:
      - ./test:/test
    command: >
      sh -c "pip install pymodbus --quiet && python /test/verify.py"
    networks:
      - replicator-net

networks:
  replicator-net:
    driver: bridge
