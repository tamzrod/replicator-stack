<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Replicator Stack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      color: #e2e8f0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header span { font-size: 0.8rem; color: #94a3b8; }

    main {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px;
      display: grid;
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 20px 24px;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #16213e;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
    }

    form { display: grid; gap: 10px; }

    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row .field { flex: 1; min-width: 120px; }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .field input, .field select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 0.875rem;
      background: #f8fafc;
      color: #1a1a2e;
      transition: border-color .15s;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #3b82f6;
      background: #fff;
    }

    button {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    button:disabled { opacity: .5; cursor: default; }

    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:not(:disabled):hover { background: #2563eb; }

    .btn-danger { background: #ef4444; color: #fff; font-size: 0.75rem; padding: 4px 10px; }
    .btn-danger:not(:disabled):hover { background: #dc2626; }

    .btn-compile { background: #10b981; color: #fff; font-size: 1rem; padding: 12px 28px; }
    .btn-compile:not(:disabled):hover { background: #059669; }

    .btn-refresh { background: #e2e8f0; color: #475569; font-size: 0.75rem; padding: 5px 12px; margin-left: auto; }
    .btn-refresh:hover { background: #cbd5e1; }

    .banner {
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.875rem;
      font-weight: 500;
      display: none;
    }
    .banner.show { display: block; }
    .banner.ok  { background: #d1fae5; color: #065f46; }
    .banner.err { background: #fee2e2; color: #991b1b; }

    .model-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
    }
    .model-header h2 { margin-bottom: 0; border: none; padding: 0; }

    pre {
      background: #f1f5f9;
      border-radius: 6px;
      padding: 14px;
      font-size: 0.8rem;
      line-height: 1.5;
      overflow: auto;
      max-height: 360px;
      color: #334155;
    }

    .empty-state {
      text-align: center;
      color: #94a3b8;
      padding: 32px 0;
      font-size: 0.875rem;
    }

    .compile-area { text-align: center; }
    .compile-area p { color: #64748b; font-size: 0.85rem; margin-bottom: 16px; }

    #compile-result {
      margin-top: 14px;
      font-size: 0.875rem;
    }

    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th { text-align: left; color: #64748b; border-bottom: 1px solid #e2e8f0; padding: 6px 8px; font-weight: 600; }
    td { padding: 6px 8px; vertical-align: top; }
    tbody tr:hover { background: #f8fafc; }

    /* ── Layout with Tree Panel ─────────────────────────────────────── */
    #app-container { display: flex; align-items: flex-start; }
    #tree-panel {
      width: 260px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      min-height: calc(100vh - 57px);
      overflow-y: auto;
      display: none;
    }
    #tree-panel.active { display: block; }
    #main-wrapper { flex: 1; min-width: 0; }
    body.tree-active main { max-width: none; }

    /* ── Tree Panel ─────────────────────────────────────────────────── */
    .tree-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 14px 10px; border-bottom: 1px solid #e2e8f0;
    }
    .tree-panel-title {
      font-size: .7rem; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .tree-add-group-btn {
      background: none; border: 1px dashed #cbd5e1; border-radius: 4px;
      color: #64748b; font-size: .65rem; padding: 2px 7px; cursor: pointer;
      font-weight: 600;
    }
    .tree-add-group-btn:hover { background: #f1f5f9; border-color: #94a3b8; }
    .tree-group-header {
      display: flex; align-items: center;
      padding: 6px 10px; cursor: pointer; user-select: none; gap: 4px;
    }
    .tree-group-header:hover { background: #f1f5f9; }
    .tree-toggle { font-size: .65rem; width: 12px; color: #94a3b8; flex-shrink: 0; }
    .tree-group-name { font-size: .78rem; font-weight: 700; color: #334155; flex: 1; }
    .tree-group-actions { display: flex; gap: 2px; opacity: 0; transition: opacity .15s; }
    .tree-group-header:hover .tree-group-actions { opacity: 1; }
    .tree-device {
      padding: 4px 10px 4px 24px;
      display: flex; align-items: center; gap: 4px; cursor: pointer;
    }
    .tree-device:hover { background: #f8fafc; }
    .tree-device.selected { background: #eff6ff; border-left: 3px solid #3b82f6; padding-left: 21px; }
    .tree-device-name {
      font-size: .78rem; color: #1e293b; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tree-device-actions { display: flex; gap: 2px; opacity: 0; transition: opacity .15s; }
    .tree-device:hover .tree-device-actions { opacity: 1; }
    .tree-device-toggle { font-size: .6rem; width: 10px; color: #cbd5e1; flex-shrink: 0; }
    .tree-read {
      padding: 3px 10px 3px 42px;
      display: flex; align-items: center; gap: 4px; cursor: pointer;
    }
    .tree-read:hover { background: #f8fafc; }
    .tree-read.selected { background: #f0fdf4; border-left: 3px solid #10b981; padding-left: 39px; }
    .tree-read-name { font-size: .72rem; color: #475569; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tree-read::before { content: '└ '; color: #cbd5e1; font-size: .7rem; flex-shrink: 0; }
    .tree-read-actions { display: flex; gap: 2px; opacity: 0; transition: opacity .15s; }
    .tree-read:hover .tree-read-actions { opacity: 1; }
    .tree-btn {
      background: none; border: none; padding: 2px 5px;
      font-size: .7rem; cursor: pointer; border-radius: 3px;
      line-height: 1; font-weight: 600;
    }
    .tree-btn-edit { color: #3b82f6; }
    .tree-btn-edit:hover { background: #dbeafe; }
    .tree-btn-del { color: #ef4444; }
    .tree-btn-del:hover { background: #fee2e2; }
    .tree-btn-grp-edit { color: #64748b; font-size: .65rem; }
    .tree-btn-grp-edit:hover { background: #f1f5f9; }
    .tree-btn-grp-del { color: #f59e0b; font-size: .65rem; }
    .tree-btn-grp-del:hover { background: #fef3c7; }

    /* ── Dialogs ─────────────────────────────────────────────────────── */
    dialog {
      border: none; border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18); padding: 0;
    }
    dialog::backdrop { background: rgba(0,0,0,.35); }

    /* ── Table enhancements ─────────────────────────────────────────── */
    tbody tr[data-device-id]:hover { background: #f0f9ff; }
    tbody tr.row-highlight { background: #dbeafe !important; }
    .btn-edit { background: #e0f2fe; color: #0369a1; font-size: 0.75rem; padding: 4px 10px; }
    .btn-edit:not(:disabled):hover { background: #bae6fd; }
  </style>
</head>
<body>

<header>
  <h1>⚡ Replicator Stack</h1>
  <span>Control Plane</span>
</header>

<div id="app-container">
<aside id="tree-panel"></aside>
<div id="main-wrapper">

<main>

  <!-- ── Current Model ─────────────────────────────────────────────── -->
  <div class="card">
    <div class="model-header">
      <h2>Current Model</h2>
      <button class="btn-refresh" id="btn-refresh">↻ Refresh</button>
    </div>
    <div id="model-display">
      <div class="empty-state">Loading…</div>
    </div>
  </div>

  <!-- ── Targets ──────────────────────────────────────────────────── -->
  <div class="card">
    <h2>Targets</h2>
    <div id="targets-list" style="margin-bottom:16px"></div>
    <form id="target-form">
      <div class="row">
        <div class="field">
          <label>Name</label>
          <input id="t-name" type="text" placeholder="Main MMA" required />
        </div>
        <div class="field">
          <label>Port</label>
          <input id="t-port" type="number" placeholder="502" min="1" max="65535" required />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Status Unit ID</label>
          <input id="t-status-unit" type="number" value="100" required />
        </div>
        <div class="field">
          <label>Status Slot Size</label>
          <input id="t-slot-size" type="number" value="10" min="1" required />
        </div>
      </div>
      <div id="target-banner" class="banner"></div>
      <div><button type="submit" class="btn-primary">Add Target</button></div>
    </form>
  </div>

  <!-- ── Add Device ─────────────────────────────────────────────────── -->
  <div class="card">
    <h2>Add Device</h2>
    <form id="device-form">
      <div class="row">
        <div class="field">
          <label>Device ID</label>
          <input id="d-id" type="text" placeholder="device-1" required />
        </div>
        <div class="field">
          <label>Name</label>
          <input id="d-name" type="text" placeholder="My Device" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Port</label>
          <input id="d-port" type="number" value="502" min="1" max="65535" required />
        </div>
        <div class="field">
          <label>Source Unit ID</label>
          <input id="d-unit" type="number" value="1" required />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Target</label>
          <select id="d-target" required>
            <option value="">— select target —</option>
          </select>
        </div>
        <div class="field">
          <label>Group <span style="color:#94a3b8;font-weight:400">(optional)</span></label>
          <select id="d-group">
            <option value="">— Ungrouped —</option>
          </select>
        </div>
      </div>
      <div id="device-banner" class="banner"></div>
      <div><button type="submit" class="btn-primary">Add Device</button></div>
    </form>
  </div>

  <!-- ── Add Read ───────────────────────────────────────────────────── -->
  <div class="card">
    <h2>Add Read</h2>
    <form id="read-form">
      <div class="row">
        <div class="field">
          <label>Device</label>
          <select id="r-device" required>
            <option value="">— select device —</option>
          </select>
        </div>
        <div class="field">
          <label>Read ID</label>
          <input id="r-id" type="text" placeholder="read-1" required />
        </div>
        <div class="field">
          <label>Name</label>
          <input id="r-name" type="text" placeholder="My Read" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Source Area</label>
          <select id="r-src-area">
            <option value="holding_registers">holding_registers</option>
            <option value="coils">coils</option>
            <option value="input_registers">input_registers</option>
            <option value="discrete_inputs">discrete_inputs</option>
          </select>
        </div>
        <div class="field">
          <label>Source Address</label>
          <input id="r-src-addr" type="number" value="0" required />
        </div>
        <div class="field">
          <label>Count</label>
          <input id="r-count" type="number" value="1" min="1" required />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Poll Interval (ms)</label>
          <input id="r-poll" type="number" value="2000" min="100" required />
        </div>
      </div>
      <div id="read-banner" class="banner"></div>
      <div><button type="submit" class="btn-primary">Add Read</button></div>
    </form>
  </div>

  <!-- ── Compile ────────────────────────────────────────────────────── -->
  <div class="card compile-area">
    <h2>Compile Config</h2>
    <p>Generate Replicator and MMA config files from the model. No services are restarted.</p>
    <button class="btn-compile" id="btn-compile">⚙ Compile</button>
    <div id="compile-result"></div>
  </div>

</main>

</div><!-- #main-wrapper -->
</div><!-- #app-container -->

<!-- ── Edit Device Dialog ────────────────────────────────────────── -->
<dialog id="edit-device-dialog">
  <div class="card" style="margin:0;min-width:340px;max-width:480px">
    <h2>Edit Device</h2>
    <form id="edit-device-form">
      <input type="hidden" id="ed-id" />
      <div class="row">
        <div class="field">
          <label>Name</label>
          <input id="ed-name" type="text" placeholder="My Device" />
        </div>
        <div class="field">
          <label>Group <span style="color:#94a3b8;font-weight:400">(optional)</span></label>
          <select id="ed-group">
            <option value="">— Ungrouped —</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Port</label>
          <input id="ed-port" type="number" min="1" max="65535" required />
        </div>
        <div class="field">
          <label>Source Unit ID</label>
          <input id="ed-unit" type="number" required />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Target</label>
          <select id="ed-target" required></select>
        </div>
      </div>
      <div id="edit-device-banner" class="banner"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button type="button" id="ed-cancel" class="btn-refresh">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</dialog>

<!-- ── Add / Edit Group Dialog ───────────────────────────────────── -->
<dialog id="group-dialog">
  <div class="card" style="margin:0;min-width:300px;max-width:400px">
    <h2 id="group-dialog-title">Add Group</h2>
    <form id="group-form">
      <input type="hidden" id="grp-id" />
      <div class="field">
        <label>Group Name</label>
        <input id="grp-name" type="text" placeholder="e.g. Inverters" required />
      </div>
      <div id="group-banner" class="banner"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button type="button" id="grp-cancel" class="btn-refresh">Cancel</button>
        <button type="submit" class="btn-primary" id="grp-submit">Add</button>
      </div>
    </form>
  </div>
</dialog>

<!-- ── Edit Read Dialog ──────────────────────────────────────────── -->
<dialog id="edit-read-dialog">
  <div class="card" style="margin:0;min-width:340px;max-width:480px">
    <h2>Edit Read</h2>
    <form id="edit-read-form">
      <input type="hidden" id="er-device-id" />
      <input type="hidden" id="er-read-id" />
      <div class="row">
        <div class="field">
          <label>Read ID</label>
          <input id="er-id-display" type="text" disabled style="background:#f1f5f9;color:#94a3b8" />
        </div>
        <div class="field">
          <label>Name</label>
          <input id="er-name" type="text" placeholder="My Read" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Source Area</label>
          <select id="er-src-area">
            <option value="holding_registers">holding_registers</option>
            <option value="coils">coils</option>
            <option value="input_registers">input_registers</option>
            <option value="discrete_inputs">discrete_inputs</option>
          </select>
        </div>
        <div class="field">
          <label>Source Address</label>
          <input id="er-src-addr" type="number" value="0" required />
        </div>
        <div class="field">
          <label>Count</label>
          <input id="er-count" type="number" value="1" min="1" required />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Poll Interval (ms)</label>
          <input id="er-poll" type="number" value="2000" min="100" required />
        </div>
      </div>
      <div id="edit-read-banner" class="banner"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button type="button" id="er-cancel" class="btn-refresh">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</dialog>

<script>
// ── API helpers ──────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data };
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Model ────────────────────────────────────────────────────────────────────

let _currentModel = null;

function findTarget(model, targetName) {
  const targets = (model.system && model.system.targets) || [];
  return targets.find(t => t.name === targetName) || null;
}

function findGroupById(model, groupId) {
  const groups = (model && model.groups) || [];
  return groups.find(g => g.id === groupId) || null;
}

function groupName(model, groupId) {
  if (!groupId) return null;
  const g = findGroupById(model, groupId);
  return g ? g.name : null;
}

function targetPort(t) {
  if (t.port != null) return t.port;
  return (t.endpoint || '').split(':')[1] || '';
}

function statusRange(device, model) {
  const target = findTarget(model, device.target_name);
  if (!target || device.status_slot == null) return '';
  const slotSize = target.status_slot_size || 10;
  const start = device.status_slot * slotSize;
  const end = start + slotSize - 1;
  return `unit ${target.status_unit_id} @ HR[${start}..${end}]`;
}

function renderTargetsList(data) {
  const el = document.getElementById('targets-list');
  const targets = (data.system && data.system.targets) || [];
  if (targets.length === 0) {
    el.innerHTML = '<div class="empty-state" style="padding:12px 0">No targets defined yet.</div>';
    return;
  }
  const rows = targets.map(t => `<tr>
    <td>${escapeHtml(t.name)}</td>
    <td>${escapeHtml(targetPort(t))}</td>
    <td>${escapeHtml(t.status_unit_id)}</td>
    <td>${escapeHtml(t.status_slot_size)}</td>
    <td><button class="btn-danger btn-delete-target" data-name="${escapeHtml(t.name)}">✕ Remove</button></td>
  </tr>`).join('');
  el.innerHTML = `<table>
    <thead><tr>
      <th>Name</th><th>Port</th><th>Status Unit ID</th><th>Slot Size</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderModel(data) {
  const el = document.getElementById('model-display');
  _currentModel = data;

  if (!data.devices || data.devices.length === 0) {
    el.innerHTML = `<div class="empty-state">No devices configured yet. Add a device below.</div>`;
    return;
  }

  const rows = data.devices.map(d => {
    const sr = statusRange(d, data);
    const readsCount = (d.reads || []).length;
    const grpName = groupName(data, d.groupId);
    return `<tr data-device-id="${escapeHtml(d.id)}">
      <td>${escapeHtml(d.id)}${d.name ? ` <span style="color:#64748b;font-size:.8rem">— ${escapeHtml(d.name)}</span>` : ''}</td>
      <td>${grpName ? escapeHtml(grpName) : '<span style="color:#cbd5e1">—</span>'}</td>
      <td>Port&nbsp;${escapeHtml(d.port)} (unit&nbsp;${escapeHtml(d.source_unit_id)})</td>
      <td>unit&nbsp;${escapeHtml(d.assigned_unit_id ?? '?')}</td>
      <td>${d.target_name ? escapeHtml(d.target_name) : '—'}</td>
      <td>${sr ? escapeHtml(sr) : '—'}</td>
      <td>${readsCount}</td>
      <td style="white-space:nowrap">
        <button class="btn-edit btn-edit-device" data-edit-device="${escapeHtml(d.id)}">✎ Edit</button>
        <button class="btn-danger btn-delete-device" data-delete-device="${escapeHtml(d.id)}">✕</button>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table>
    <thead>
      <tr>
        <th>Device</th>
        <th>Group</th>
        <th>Source</th>
        <th>Assigned Unit</th>
        <th>Target</th>
        <th>Status Location</th>
        <th>Reads</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function refreshGroupDropdowns(data) {
  const groups = (data && data.groups) || [];

  // Add Device form group select
  const dSel = document.getElementById('d-group');
  const dPrev = dSel.value;
  dSel.innerHTML = '<option value="">— Ungrouped —</option>';
  for (const g of groups) {
    const opt = document.createElement('option');
    opt.value = g.id;
    opt.textContent = g.name;
    dSel.appendChild(opt);
  }
  if (dPrev) dSel.value = dPrev;

  // Edit Device dialog group select
  const edSel = document.getElementById('ed-group');
  const edPrev = edSel.value;
  edSel.innerHTML = '<option value="">— Ungrouped —</option>';
  for (const g of groups) {
    const opt = document.createElement('option');
    opt.value = g.id;
    opt.textContent = g.name;
    edSel.appendChild(opt);
  }
  if (edPrev) edSel.value = edPrev;
}

async function loadModel() {
  const { ok, data } = await api('GET', '/model');
  const el = document.getElementById('model-display');
  if (!ok) {
    el.innerHTML = `<div class="empty-state" style="color:#ef4444">Failed to load model</div>`;
    return;
  }

  _currentModel = data;
  renderModel(data);
  renderTargetsList(data);
  renderTree(data);
  refreshGroupDropdowns(data);

  // refresh target dropdown in device form
  const targets = (data.system && data.system.targets) || [];
  const tsel = document.getElementById('d-target');
  const tprev = tsel.value;
  tsel.innerHTML = '<option value="">— select target —</option>';
  for (const t of targets) {
    const opt = document.createElement('option');
    opt.value = t.name;
    opt.textContent = `${t.name} (port ${targetPort(t)})`;
    tsel.appendChild(opt);
  }
  if (tprev) tsel.value = tprev;

  // refresh device select in read form
  const sel = document.getElementById('r-device');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— select device —</option>';
  if (data.devices) {
    for (const d of data.devices) {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = `${d.id}${d.name ? ' — ' + d.name : ''} (unit ${d.assigned_unit_id != null ? d.assigned_unit_id : '?'})`;
      sel.appendChild(opt);
    }
  }
  if (prev) sel.value = prev;
}

// ── Tree ─────────────────────────────────────────────────────────────────────

const TREE_THRESHOLD = 3;
let _selectedDeviceId = null;
let _selectedReadKey = null; // "deviceId::readId"
const _collapsedGroups = new Set();
const _collapsedDevices = new Set();

function findDeviceRow(deviceId) {
  return document.querySelector(`#model-display tr[data-device-id="${CSS.escape(deviceId)}"]`);
}

function buildTreeGroups(data) {
  const groups = (data && data.groups) || [];
  const devices = (data && data.devices) || [];

  // Map groupId → devices
  const grouped = {};
  for (const d of devices) {
    const key = d.groupId || '__ungrouped__';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(d);
  }

  const result = [];
  // Named groups (sorted by name)
  for (const g of [...groups].sort((a, b) => a.name.localeCompare(b.name))) {
    result.push({ id: g.id, name: g.name, devices: grouped[g.id] || [], isUngrouped: false });
  }
  // Ungrouped
  if (grouped['__ungrouped__'] && grouped['__ungrouped__'].length > 0) {
    result.push({ id: '__ungrouped__', name: 'Ungrouped', devices: grouped['__ungrouped__'], isUngrouped: true });
  }
  return result;
}

function renderTree(data) {
  const panel = document.getElementById('tree-panel');
  const devices = (data && data.devices) || [];
  const groups = (data && data.groups) || [];

  // Show tree when there are groups defined OR device count exceeds threshold
  if (groups.length === 0 && devices.length <= TREE_THRESHOLD) {
    panel.classList.remove('active');
    document.body.classList.remove('tree-active');
    return;
  }

  panel.classList.add('active');
  document.body.classList.add('tree-active');

  const treeGroups = buildTreeGroups(data);
  let html = `<div class="tree-panel-header">
    <span class="tree-panel-title">Devices</span>
    <button class="tree-add-group-btn" id="btn-add-group" title="Add new group">+ Group</button>
  </div>`;

  for (const group of treeGroups) {
    const collapsed = _collapsedGroups.has(group.id);
    const toggle = collapsed ? '▶' : '▼';
    const grpActions = group.isUngrouped ? '' :
      `<span class="tree-group-actions">
        <button class="tree-btn tree-btn-grp-edit" data-edit-group="${escapeHtml(group.id)}" title="Rename group">✎</button>
        <button class="tree-btn tree-btn-grp-del" data-del-group="${escapeHtml(group.id)}" title="Remove group — devices move to Ungrouped">✕</button>
      </span>`;

    html += `<div class="tree-group">`;
    html += `<div class="tree-group-header" data-toggle-group="${escapeHtml(group.id)}">
      <span class="tree-toggle">${toggle}</span>
      <span class="tree-group-name">${escapeHtml(group.name)}</span>
      ${grpActions}
    </div>`;

    if (!collapsed) {
      for (const d of group.devices) {
        const sel = d.id === _selectedDeviceId ? ' selected' : '';
        const devCollapsed = _collapsedDevices.has(d.id);
        const devToggle = (d.reads && d.reads.length > 0) ? (devCollapsed ? '▶' : '▼') : '·';
        const label = d.name
          ? `${escapeHtml(d.id)} <span style="color:#94a3b8;font-size:.72rem">— ${escapeHtml(d.name)}</span>`
          : escapeHtml(d.id);
        html += `<div class="tree-device${sel}" data-device-id="${escapeHtml(d.id)}">
          <span class="tree-device-toggle" data-toggle-device="${escapeHtml(d.id)}">${devToggle}</span>
          <span class="tree-device-name">${label}</span>
          <span class="tree-device-actions">
            <button class="tree-btn tree-btn-edit" data-edit-device="${escapeHtml(d.id)}" title="Edit">✎</button>
            <button class="tree-btn tree-btn-del" data-delete-device="${escapeHtml(d.id)}" title="Delete">✕</button>
          </span>
        </div>`;
        if (!devCollapsed) {
          for (const r of (d.reads || [])) {
            const readKey = `${d.id}::${r.id}`;
            const readSel = readKey === _selectedReadKey ? ' selected' : '';
            html += `<div class="tree-read${readSel}" data-device-id="${escapeHtml(d.id)}" data-read-id="${escapeHtml(r.id)}">
              <span class="tree-read-name">${escapeHtml(r.id)}${r.name ? ` — ${escapeHtml(r.name)}` : ''}</span>
              <span class="tree-read-actions">
                <button class="tree-btn tree-btn-edit" data-edit-read="${escapeHtml(r.id)}" data-read-device="${escapeHtml(d.id)}" title="Edit read">✎</button>
                <button class="tree-btn tree-btn-del" data-delete-read="${escapeHtml(r.id)}" data-read-device="${escapeHtml(d.id)}" title="Delete read">✕</button>
              </span>
            </div>`;
          }
        }
      }
    }
    html += `</div>`;
  }
  panel.innerHTML = html;

  // Attach add-group button
  const addGrpBtn = panel.querySelector('#btn-add-group');
  if (addGrpBtn) addGrpBtn.addEventListener('click', openAddGroup);
}

document.getElementById('tree-panel').addEventListener('click', async e => {
  // Delete group button
  const delGroup = e.target.closest('[data-del-group]');
  if (delGroup) { await deleteGroup(delGroup.dataset.delGroup); return; }

  // Edit group button
  const editGroup = e.target.closest('[data-edit-group]');
  if (editGroup) { openEditGroup(editGroup.dataset.editGroup); return; }

  // Toggle group collapse
  const toggleGrp = e.target.closest('[data-toggle-group]');
  if (toggleGrp && !e.target.closest('[data-del-group]') && !e.target.closest('[data-edit-group]')) {
    const g = toggleGrp.dataset.toggleGroup;
    if (_collapsedGroups.has(g)) _collapsedGroups.delete(g);
    else _collapsedGroups.add(g);
    renderTree(_currentModel);
    return;
  }

  // Toggle device reads collapse
  const toggleDev = e.target.closest('[data-toggle-device]');
  if (toggleDev) {
    e.stopPropagation();
    const id = toggleDev.dataset.toggleDevice;
    if (_collapsedDevices.has(id)) _collapsedDevices.delete(id);
    else _collapsedDevices.add(id);
    renderTree(_currentModel);
    return;
  }

  // Edit read
  const editRead = e.target.closest('[data-edit-read]');
  if (editRead) {
    openEditRead(editRead.dataset.readDevice, editRead.dataset.editRead);
    return;
  }

  // Delete read
  const delRead = e.target.closest('[data-delete-read]');
  if (delRead) {
    await deleteRead(delRead.dataset.readDevice, delRead.dataset.deleteRead);
    return;
  }

  // Edit device from tree
  const editBtn = e.target.closest('[data-edit-device]');
  if (editBtn) { openEditDevice(editBtn.dataset.editDevice); return; }

  // Delete device from tree
  const delBtn = e.target.closest('[data-delete-device]');
  if (delBtn) { await deleteDevice(delBtn.dataset.deleteDevice); return; }

  // Select read node
  const readRow = e.target.closest('.tree-read[data-read-id]');
  if (readRow) {
    _selectedReadKey = `${readRow.dataset.deviceId}::${readRow.dataset.readId}`;
    _selectedDeviceId = readRow.dataset.deviceId;
    renderTree(_currentModel);
    const tr = findDeviceRow(_selectedDeviceId);
    if (tr) {
      tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      tr.classList.add('row-highlight');
      setTimeout(() => tr.classList.remove('row-highlight'), 2000);
    }
    return;
  }

  // Select device — highlight in main table
  const deviceRow = e.target.closest('.tree-device[data-device-id]');
  if (deviceRow) {
    _selectedDeviceId = deviceRow.dataset.deviceId;
    _selectedReadKey = null;
    renderTree(_currentModel);
    const tr = findDeviceRow(_selectedDeviceId);
    if (tr) {
      tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      tr.classList.add('row-highlight');
      setTimeout(() => tr.classList.remove('row-highlight'), 2000);
    }
  }
});

async function deleteGroup(groupId) {
  const model = _currentModel || {};
  const group = (model.groups || []).find(g => g.id === groupId);
  const name = group ? group.name : groupId;
  if (!confirm(`Remove group "${name}"? Devices in this group will become Ungrouped.`)) return;
  const { ok, data } = await api('DELETE', `/group/${encodeURIComponent(groupId)}`);
  if (!ok) { alert(`Error: ${data.error || 'Unknown error'}`); return; }
  await loadModel();
}
