<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCS Web — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #F5F7FA;
      color: #1F2933;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0B3C5D;
      color: #E2E8F0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header span { font-size: 0.8rem; color: #93C5D8; }

    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 36px 40px;
      width: 100%;
      max-width: 380px;
    }

    .login-card h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0B3C5D;
      margin-bottom: 24px;
      text-align: center;
    }

    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #D1D5DB;
      border-radius: 7px;
      font-size: .9rem;
      color: #1F2933;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }

    .btn-login {
      width: 100%;
      padding: 10px;
      background: #1D4ED8;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
    }
    .btn-login:hover { background: #2563EB; }
    .btn-login:disabled { background: #6B7280; cursor: wait; }

    .banner {
      margin-top: 12px;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: .83rem;
      display: none;
    }
    .banner.error { display: block; background: #FEF2F2; color: #B91C1C; border: 1px solid #FCA5A5; }
  </style>
</head>
<body>

<header>
  <h1>⚡ MCS Web</h1>
  <span>Modbus Consolidator System</span>
</header>

<div class="login-wrap">
  <div class="login-card">
    <h2>🔒 Sign In</h2>
    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="btn-login" type="submit" id="btn-submit">Sign In</button>
      <div class="banner" id="login-banner"></div>
    </form>
  </div>
</div>

<script>
  // If already authenticated, go straight to the app
  fetch('/auth/status')
    .then(r => r.json())
    .then(data => { if (data.authenticated) window.location.replace('/'); })
    .catch(() => {});

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn    = document.getElementById('btn-submit');
    const banner = document.getElementById('login-banner');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    banner.className = 'banner';
    banner.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res  = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        window.location.replace('/');
      } else {
        banner.className = 'banner error';
        banner.textContent = data.error || 'Login failed. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch (err) {
      banner.className = 'banner error';
      banner.textContent = 'Network error. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
