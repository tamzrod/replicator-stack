version: "3.9"

services:

  mma:
    image: rodtamin/modbus-memory-appliance:2.3.4
    container_name: mma
    restart: unless-stopped
    ports:
      - "502:502"
    volumes:
      - ./data/mma:/config
    command: ["/config/config.yaml"]
    environment:
      - APP_VERSION=${APP_VERSION:-dev}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - replicator-net

  replicator:
    image: rodtamin/modbus-replicator:latest
    container_name: replicator
    restart: unless-stopped
    depends_on:
      - mma
    volumes:
      - ./data/replicator:/config
    command: ["/config/config.yaml"]
    environment:
      - APP_VERSION=${APP_VERSION:-dev}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - replicator-net

  web:
    build:
      context: ./web
      args:
        # Baked into image at build time so the server can report them even
        # when the Docker socket is unavailable.
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_SHA: ${GIT_SHA:-}
    image: rodtamin/mcs-web:${APP_VERSION:-dev}
    container_name: mcs-web
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Runtime identity — DOCKER_DIGEST must be injected by the deployment
      # pipeline after the image is pushed (never hardcoded here).
      - DOCKER_DIGEST=${DOCKER_DIGEST:-}
      # Allow runtime override of the version label and git SHA if needed;
      # the baked-in values from the build args serve as safe defaults.
      - APP_VERSION=${APP_VERSION:-dev}
      - GIT_SHA=${GIT_SHA:-}
    depends_on:
      - mma
      - replicator
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - replicator-net

networks:
  replicator-net:
    driver: bridge