listeners:
  - id: main
    listen: ":502"

    memory:

      # ==============================
      # UNIT 1 → M100 (Holding Mirror)
      # ==============================
      - unit_id: 1

        holding_registers:
          start: 998
          count: 200   # 998–1116

        policy:
          rules:
            - id: read-only
              source_ip:
                - 0.0.0.0/0
                - ::/0
              allow_fc: [3]


      # ==============================
      # UNIT 2 → M200
      # ==============================
      - unit_id: 2

        holding_registers:
          start: 998
          count: 200

        policy:
          rules:
            - id: read-only
              source_ip:
                - 0.0.0.0/0
                - ::/0
              allow_fc: [3]


      # ==============================
      # UNIT 3 → M300
      # ==============================
      - unit_id: 3

        holding_registers:
          start: 998
          count: 200

        policy:
          rules:
            - id: read-only
              source_ip:
                - 0.0.0.0/0
                - ::/0
              allow_fc: [3]


      # ==============================
      # UNIT 100 → STATUS MEMORY
      # 20 slots × 20 registers
      # Slot 1 = 0–19
      # Slot 20 = 380–399
      # ==============================
      - unit_id: 100

        holding_registers:
          start: 0
          count: 400

        policy:
          rules:
            - id: read-only
              source_ip:
                - 0.0.0.0/0
                - ::/0
              allow_fc: [3]